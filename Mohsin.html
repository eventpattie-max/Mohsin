<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mohsin Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:linear-gradient(135deg,#c9d6ff,#e2e2e2,#fbc2eb);
min-height:100vh;
color:black;
}

nav{
padding:20px 8%;
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.08);
position:sticky;
top:0;
}

.logo{font-size:28px;font-weight:700;}
.logo span{color:#ffe600;}

.btn{
padding:10px 20px;
border-radius:20px;
border:none;
cursor:pointer;
background:white;
font-weight:600;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px 8%;
}

.product{
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:20px;
text-align:center;
}

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
}

.admin-box{
margin:40px 8%;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.2);
}
input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
}

.hidden{display:none;}
</style>
</head>

<body>

<nav>
<div class="logo">Mohsin <span>Fashion</span></div>
</nav>

<div class="products" id="productList"></div>

<div class="admin-box">

<h2>Admin Login</h2>

<input type="password" id="pass" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button class="btn hidden" id="logoutBtn" onclick="logout()">Logout</button>

<div id="panel" class="hidden">

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<input type="file" id="img">

<button class="btn" onclick="addProduct()">Add</button>

</div>

</div>

<script>

const adminPassword = "1234";
let isAdmin = false;

let products = [
{name:"Dress",price:1200,stock:"Available",img:"https://images.unsplash.com/photo-1496747611176-843222e1e57c"},
{name:"Bag",price:900,stock:"Available",img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"}
];

function render(){

let html="";

products.forEach((p,i)=>{

html += `
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<p>${p.stock}</p>

<button class="btn" onclick="order('${p.name}')">WhatsApp</button>

${isAdmin ? `<button class="btn" style="background:red;color:white;" onclick="removeProduct(${i})">Remove</button>` : ""}

</div>
`;
});

document.getElementById("productList").innerHTML = html;
}

function order(name){
window.open("https://wa.me/918121969815?text=I want "+name);
}

function login(){
if(document.getElementById("pass").value === adminPassword){
isAdmin = true;
document.getElementById("panel").classList.remove("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");
render();
alert("Admin Login Success");
}else{
alert("Wrong Password");
}
}

function logout(){
isAdmin = false;
document.getElementById("panel").classList.add("hidden");
document.getElementById("logoutBtn").classList.add("hidden");
render();
}

function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let stock=document.getElementById("stock").value;

products.push({
name,price,stock,
img:"https://images.unsplash.com/photo-1496747611176-843222e1e57c"
});

render();
}

function removeProduct(i){
if(isAdmin){
products.splice(i,1);
render();
}
}

render();

</script>

</body>
</html>
